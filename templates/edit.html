<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Teeth Detection Edit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesedit.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Boxicons CDN Link and Font Awesome CDN Link -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <div class="container disable">
        <h2>Edit</h2>
        <div class="wrapper">
            <div class = "editor-panel">
                <div class="filter">
                    <label class="title">Filters</label>
                    <div class="options">
                        <button id="brightness" class="active">Brightness</button>
                        <button id="saturation">Saturation</button>
                        <button id="inversion">Inversion</button>
                        <button id="grayscale">Grayscale</button>
                    </div>
                    <div class="slider">
                        <div class="filter-info">
                            <p class="name">Brightness</p>
                            <p class="value">100%</p>
                        </div>
                        <input type="range" value="100" min="0" max="200">
                    </div>
                </div>
                <div class="rotate">
                    <label class="title">Rotate & Flip</label>
                    <div class="options">
                        <button id="left"><i class="fa-solid fa-rotate-left"></i></button>
                        <button id="right"><i class="fa-solid fa-rotate-right"></i></button>
                        <button id="horizontal"><i class="bx bx-reflect-vertical"></i></button>
                        <button id="vertical"><i class="bx bx-reflect-horizontal"></i></button>
                    </div>
                </div>
                <div class = "measurements">
                    <button id="measure-toggle">Enable Measurement</button>
                    <p id="measure-output1" class="red-text">Distance1: 0 px (0 cm)</p>
                    <p id="measure-output2" class="blue-text">Distance2: 0 px (0 cm)</p> <!-- Add class for blue text -->
                    <p id="angle-output">Angle: 0°</p> <!-- Set initial value for angle -->
                </div>
            </div>
            <div class = "preview-img">
                <img src="{{ url_for('static', filename='image-placeholder.svg') }}" alt="preview-img">
                <canvas id="measurement-canvas"></canvas>
            </div>
        </div>
        <div class="controls">
            <button class='reset-filter'>Reset Filters</button>
            <div class="row">
                <input type="file" class="file-input" accept="image/*" hidden>
                <button class="choose-img">Choose Image</button>
                <button class="save-img">Save Image</button>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
